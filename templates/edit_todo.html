{% extends "base.html" %}
{% block title %}Edit Task · Taskly{% endblock %}

{% block extra_styles %}
<style>
  .page { max-width: 560px; margin: 3rem auto; padding: 0 1.5rem 4rem; }
  .edit-card { padding: 2.2rem 2rem; border-radius: 20px; }
  .edit-header { margin-bottom: 1.8rem; }
  .edit-header h1 { font-size: 1.8rem; }
  .edit-header p { color: var(--ink-soft); font-size: .9rem; margin-top: .3rem; }
  .form-actions { display: flex; gap: .8rem; margin-top: 1.4rem; }
</style>
{% endblock %}

{% block content %}
<div class="page">
  <div class="card edit-card">
    <div class="edit-header">
      <h1>✏️ Edit Task</h1>
      <p>Update the details of your task below.</p>
    </div>

    <form method="POST" action="{{ url_for('edit_todo', todo_id=todo.id) }}">
      <div class="form-group">
        <label for="title">Task Title</label>
        <input type="text" id="title" name="title" value="{{ todo.title }}" required />
      </div>
      <div class="form-group">
        <label for="description">Notes (optional)</label>
        <textarea id="description" name="description">{{ todo.description }}</textarea>
      </div>
      <div class="form-group">
        <label for="priority">Priority</label>
        <select id="priority" name="priority">
          <option value="low"    {% if todo.priority=='low'    %}selected{% endif %}>🟢 Low</option>
          <option value="medium" {% if todo.priority=='medium' %}selected{% endif %}>🟡 Medium</option>
          <option value="high"   {% if todo.priority=='high'   %}selected{% endif %}>🔴 High</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
